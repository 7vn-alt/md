<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work In Progress</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family: "Georgia", serif;
  background:linear-gradient(to bottom,#fdfcff,#f3f0ff,#fff8f0);
  display:flex;
  justify-content:center;
  align-items:center;
  color:#d4af37;
  position:relative;
}

/* Soft glowing background pulse */
@keyframes glowBG{
  0%{filter:brightness(1)}
  50%{filter:brightness(1.08)}
  100%{filter:brightness(1)}
}
body{
  animation:glowBG 6s infinite ease-in-out;
}

/* Light rays */
.rays{
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle at center,
      rgba(255,255,255,0.6) 0%,
      rgba(255,255,255,0.3) 20%,
      transparent 60%);
  animation:rotateRays 40s linear infinite;
}
@keyframes rotateRays{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* Floating feathers */
.feather{
  position:absolute;
  width:15px;
  height:30px;
  background:linear-gradient(to bottom,white,rgba(255,255,255,0.6));
  border-radius:50%;
  opacity:0.7;
  animation:fall linear infinite;
}
@keyframes fall{
  from{transform:translateY(-10vh) rotate(0deg)}
  to{transform:translateY(110vh) rotate(360deg)}
}

/* Center content */
.container{
  text-align:center;
  z-index:10;
}

/* Halo effect */
.halo{
  width:160px;
  height:160px;
  border-radius:50%;
  border:3px solid rgba(212,175,55,0.5);
  box-shadow:
    0 0 20px rgba(212,175,55,0.6),
    inset 0 0 30px rgba(212,175,55,0.4);
  margin:0 auto 30px;
  animation:haloPulse 4s infinite ease-in-out;
}
@keyframes haloPulse{
  0%,100%{transform:scale(1);opacity:0.8}
  50%{transform:scale(1.1);opacity:1}
}

/* Title shimmer */
h1{
  font-size:3.5rem;
  letter-spacing:4px;
  background:linear-gradient(90deg,#d4af37,#fff,#d4af37);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmer 5s linear infinite;
}
@keyframes shimmer{
  from{background-position:0%}
  to{background-position:200%}
}

/* Subtitle fade */
p{
  margin-top:15px;
  font-size:1.1rem;
  color:#bfa14a;
  opacity:0.7;
  animation:fade 6s infinite;
}
@keyframes fade{
  0%,100%{opacity:0.4}
  50%{opacity:1}
}

/* Soft glow particles */
.sparkle{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 10px white;
  animation:sparkleMove linear infinite;
}
@keyframes sparkleMove{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<div class="rays"></div>

<div class="container">
  <div class="halo"></div>
  <h1>WORK IN PROGRESS</h1>
</div>

<script>
/* Generate feathers */
for(let i=0;i<40;i++){
  let f=document.createElement("div");
  f.className="feather";
  f.style.left=Math.random()*100+"%";
  f.style.animationDuration=(6+Math.random()*6)+"s";
  f.style.animationDelay=Math.random()*5+"s";
  document.body.appendChild(f);
}

/* Generate sparkles */
for(let i=0;i<50;i++){
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(4+Math.random()*6)+"s";
  s.style.animationDelay=Math.random()*5+"s";
  document.body.appendChild(s);
}
</script>

</body>
</html>
