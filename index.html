<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Viewer</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
      padding: 24px;
    }

    .top-actions {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .destroy-btn {
      background: #d32f2f;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.2s;
    }

    .destroy-btn:hover {
      background: #9a0007;
    }

    h1 {
      margin-bottom: 24px;
      text-align: center;
    }

    .pdf-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .pdf-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .pdf-header h2 {
      font-size: 20px;
    }

    .download-btn {
      text-decoration: none;
      background: #007bff;
      color: white;
      padding: 10px 16px;
      border-radius: 6px;
      transition: 0.2s;
    }

    .download-btn:hover {
      background: #0056b3;
    }

    iframe {
      width: 100%;
      height: 700px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      iframe {
        height: 500px;
      }

      .pdf-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- TOP BUTTON -->
  <div class="top-actions">
    <button class="destroy-btn" onclick="destroyPage()">
      Destroy Page & Open Android Studio
    </button>
  </div>

  <h1>PDF Documents</h1>

  <!-- PDF 1 -->
  <div class="pdf-container">
    <div class="pdf-header">
      <h2>Document 1</h2>

      <a href="document1.pdf" download class="download-btn">
        Download PDF
      </a>
    </div>

    <iframe src="document1.pdf"></iframe>
  </div>

  <!-- PDF 2 -->
  <div class="pdf-container">
    <div class="pdf-header">
      <h2>Document 2</h2>

      <a href="document2.pdf" download class="download-btn">
        Download PDF
      </a>
    </div>

    <iframe src="document2.pdf"></iframe>
  </div>

  <script>
  function destroyPage() {

    // Instantly replace current page
    document.body.innerHTML = `
      <div style="
        background:#111;
        color:white;
        width:100vw;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:32px;
        font-weight:bold;
      ">
        Opening Android Studio...
      </div>
    `;

    // Immediate redirect
    window.location.replace(
      "https://developer.android.com/studio"
    );
  }
</script>

</body>
</html>
